server:
  port: 8080

spring:
  application:
    name: travel-assistant
  mvc:
    async:
      request-timeout: 300000  # SSE异步请求超时
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-d9e4ff14ddc1428ea34311e3423ee000}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7

  # 数据库配置（可选）
  datasource:
    url: jdbc:mysql://localhost:3306/travel_assistant?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis配置（可选）
  data:
    redis:
      host: localhost
      port: 6379




# 日志配置
logging:
  level:
    cn.sdh.travel: DEBUG
    com.alibaba.cloud.ai: DEBUG
