server:
  port: 8080

spring:
  application:
    name: travel-assistant
  mvc:
    async:
      request-timeout: 300000  # SSE异步请求超时
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-d9e4ff14ddc1428ea34311e3423ee000}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7

  # 数据库配置（可选）
  datasource:
    url: jdbc:mysql://localhost:3306/travel_assistant?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Flyway数据库迁移配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  



# 日志配置
logging:
  level:
    cn.sdh.travel: DEBUG
    com.alibaba.cloud.ai: DEBUG


xushu:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: xushu_jwt_secret_key_for_admin_access_256_bits_required
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: Authorization
    user-secret-key: xushu_jwt_secret_key_for_user_access_256_bits_required
    user-ttl: 7200000
    user-token-name: Authorization

# 微信配置
wechat:
  # 微信支付配置
  pay:
    # 是否启用微信支付（配置完整后设为true）
    enabled: ${WECHAT_PAY_ENABLED:false}
    # 应用ID（小程序/公众号的AppID）
    app-id: ${WECHAT_PAY_APP_ID:your_app_id_here}
    # 商户号
    mch-id: ${WECHAT_PAY_MCH_ID:your_mch_id_here}
    # API V3密钥
    api-v3-key: ${WECHAT_PAY_API_V3_KEY:your_api_v3_key_here}
    # 商户私钥文件路径（需要将私钥文件放到resources目录下）
    private-key-path: ${WECHAT_PAY_PRIVATE_KEY_PATH:classpath:apiclient_key.pem}
    # 商户证书序列号
    merchant-serial-number: ${WECHAT_PAY_SERIAL_NUMBER:your_serial_number_here}
    # 回调地址（需要配置为外网可访问的HTTPS地址）
    notify-url: ${WECHAT_PAY_NOTIFY_URL:https://your-domain.com/api/payment/callback/wechat}
  # 微信开放平台登录配置
  open-platform:
    app-id: ${WECHAT_OPEN_APP_ID:your_app_id}
    app-secret: ${WECHAT_OPEN_APP_SECRET:your_app_secret}
    redirect-uri: ${WECHAT_REDIRECT_URI:https://your-domain.com/api/auth/wechat/callback}

# 支付宝配置
alipay:
  # 应用ID
  app-id: ${ALIPAY_APP_ID:9021000162685505}
  # 应用私钥
  private-key: ${ALIPAY_PRIVATE_KEY:}
  # 支付宝公钥
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
  # 异步通知地址
  notify-url: ${ALIPAY_NOTIFY_URL:https://your-domain.com/api/payment/callback/alipay}
  # 同步跳转地址
  return-url: ${ALIPAY_RETURN_URL:https://your-domain.com/payment/result}
  # 是否沙箱环境
  sandbox: ${ALIPAY_SANDBOX:true}

# 短信验证码配置
sms:
  mock-enabled: true
  code-expire-minutes: 5

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://192.168.88.30:9000}
  access-key: ${MINIO_ACCESS_KEY:nqTaLC4DJxizPEQtNonH}
  secret-key: ${MINIO_SECRET_KEY:sqOGlmnVfRlS4KeFSrAzqHCWILRaTtXdkHpQI5lp}
  bucket-name: ${MINIO_BUCKET:travel-guide}

# 高德地图配置
gaode:
  map:
    api-key: ${GAODE_MAP_API_KEY:6853e704612bd320c0b452a5be5c1efc}
    base-url: https://restapi.amap.com/v3
    connect-timeout: 5000
    read-timeout: 10000
    enabled: true